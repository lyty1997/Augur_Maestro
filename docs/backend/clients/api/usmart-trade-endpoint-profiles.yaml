version: 0.1.0-draft
kind: usmart_trade_endpoint_profiles
api_family: trade_openapi
status: draft
owner: RobustQuant TradingGateway
source_documents:
  - ../../../../API_manual/uSmart/API_manual/usmart-trade-openapi.zh-cn.md
  - ../../../../API_manual/uSmart/openapi-demo-py/common/req_util.py
  - ../../../../API_manual/uSmart/openapi-demo-py/common/utils.py
  - ../../../../API_manual/uSmart/openapi-demo-py/api/trade.py
  - usmart-trade-key-material-profiles.yaml
  - usmart-trade-session-retry-profiles.yaml
  - usmart-trade-readonly-acceptance-matrix.yaml
  - usmart-trade-runtime-config-profile.yaml
  - usmart-trade-openapi.draft.yaml
  - usmart-trade-error-codes.draft.yaml
  - ../usmart-openapi-call-design.md
  - ../usmart-openapi-api-manual.md
  - ../usmart-readonly-integration-runbook.md
  - ../../trading/broker-trading-gateway.md
  - ../../trading/broker-gateway-raw-record-profile.yaml
policy:
  web_manual_primary_for_fields: true
  python_demo_primary_for_signing_and_serialization: true
  endpoint_profile_required_for_http_builder: true
  no_global_header_assumptions: true
  no_silent_demo_fallback: true
  default_real_http_mode: dry_run
  key_material_profile_required: usmart_trade_default
  session_retry_profile_required: usmart_single_account_memory_session_v1
  operation_policy_profile_required: true
  readonly_acceptance_matrix_required: usmart-trade-readonly-acceptance-matrix.yaml
  runtime_config_profile_required: usmart_readonly_integration_v1
  notes:
    - Profiles describe the actual HTTP boundary for request builder, signer, transport, mapper, and contract tests.
    - Internal DTOs stay broker-agnostic; these profiles are consumed only inside the uSmart adapter/client layer.
    - If web manual and official Python demo conflict, keep both facts here and choose a default explicitly.
common:
  method: POST
  content_type: application/json; charset=utf-8
  transport_timeout_ms:
    demo_timeout_ms: 5000
    default_connect_timeout_ms: 3000
    default_read_timeout_ms: 5000
  body_serialization_profiles:
    trade_json_body:
      description: Sign and send the exact same JSON body string.
      python_demo: json.dumps(params)
      canonicalization: stable_json_without_post_sign_mutation
      required: true
      pending_confirmation: Exact whitespace/key-order acceptance is not specified by manual/demo; verify by offline signature fixtures and controlled readonly integration debugging.
  sign_profiles:
    trade_body_md5_rsa_b64:
      api_family: trade_openapi
      sign_input: final_json_body_string
      algorithm: MD5withRSA
      encoding_default: standard_base64
      encoding_alternatives:
        - urlsafe_base64
      padding_default: keep_padding
      key_role: trade_sign_private_key
      key_material_profile: usmart_trade_default
      demo_reference: common/utils.py sign_to_b64str(json.dumps(params))
    quote_header_body_md5_rsa_urlsafe_b64:
      api_family: quote_base_openapi
      sign_input: Authorization + X-Channel + X-Lang + X-Request-Id + X-Time + final_json_body_string
      algorithm: MD5withRSA
      encoding_default: urlsafe_base64
      key_role: quote_sign_private_key
      key_material_profile: quote_gateway_profile_not_defined_here
      mounted_under_trading_gateway: false
  encryption_profiles:
    sensitive_rsa_pkcs1_v1_5_urlsafe_b64:
      algorithm: RSA_PKCS1_v1_5_encrypt
      encoding: urlsafe_base64
      key_role: sensitive_encrypt_public_key
      key_material_profile: usmart_trade_default
      applies_to:
        - phoneNumber
        - login_password
        - captcha_phoneNumber
        - trade_password
      demo_reference: common/utils.py rsa_encrypt
      note: Official demo maps public_key to sensitive-field encryption and private_key to X-Sign signing; common/utils.py PEM headers are unusual, so runtime must validate by key_role.
  header_profiles:
    trade_demo_default:
      required_headers:
        - Content-type
        - X-Lang
        - X-Channel
        - X-Sign
      conditional_headers:
        Authorization: required_after_login
      optional_headers:
        - X-Time
        - X-Dt
        - X-Type
        - X-Request-Id
      forbidden_headers: []
      demo_observed_headers:
        - Content-type
        - X-Lang
        - X-Channel
        - X-Sign
        - Authorization
      default_policy: Follow official Python demo for trade helper, but omit Authorization when token is absent.
    trade_login_no_auth:
      required_headers:
        - Content-type
        - X-Lang
        - X-Channel
        - X-Sign
      optional_headers:
        - X-Time
        - X-Dt
        - X-Type
        - X-Request-Id
      forbidden_headers:
        - Authorization
      default_policy: Login/captcha endpoints must not send Authorization=None just because the demo helper would include the token field.
    trade_with_request_id:
      inherits: trade_demo_default
      required_headers:
        - Content-type
        - X-Lang
        - X-Channel
        - X-Sign
        - Authorization
        - X-Request-Id
      optional_headers:
        - X-Time
        - X-Dt
        - X-Type
      default_policy: Used only by endpoint profiles that explicitly require X-Request-Id.
  request_id_profiles:
    none:
      send_header: false
      internal_broker_request_id_required: true
    web_manual_30:
      send_header: true
      length: 30
      type: string
      source: web_manual
      pending_confirmation: Web manual says 30 digits for many endpoints.
    demo_modify_16:
      send_header: true
      length: 16
      type: string
      source: official_python_demo
      generator: unix_time_fraction_16_digits
      pending_confirmation: Demo uses gen_unix_time_str(16) for modify-order only.
    configurable:
      send_header: profile_or_config
      allowed_lengths:
        - 16
        - 19
        - 30
      type: string
      default: none
      pending_confirmation: Final accepted length must be verified per endpoint.
  serial_no_profiles:
    none:
      required: false
    snowflake_19_string_or_int64:
      required: true
      field: serialNo
      max_length: 19
      internal_type: string
      http_json_type_default: number
      http_json_type_alternative: string
      source: web_manual_and_demo
      demo_generator: gen_serialno_str returns 19 digit string
      audit_required: true
    optional_order_lookup:
      required: conditional
      field: serialNo
      condition: serialNo or entrustId must be present
      max_length: 19
      internal_type: string
      http_json_type_default: number
      http_json_type_alternative: string
      audit_required: true
    configurable:
      required: profile_or_config
      field: serialNo
      max_length: 19
      internal_type: string
      http_json_type_default: number
      http_json_type_alternative: string
      audit_required: true
      pending_confirmation: Endpoint-specific serialNo requirement must be confirmed before real trade action.
  pagination_profiles:
    none:
      paginated: false
    web_1_based_default_10_max_20:
      paginated: true
      internal_page_base: 1
      http_page_base_default: 1
      default_page_num: 1
      default_page_size: 10
      max_page_size: 20
      overflow_policy: clamp_and_audit
    today_entrust_web_with_demo_compat:
      paginated: true
      internal_page_base: 1
      http_page_base_default: 1
      default_page_num: 1
      default_page_size: 10
      max_page_size: 20
      demo_compat:
        enabled_by_default: false
        demo_page_num: "0"
        demo_page_size: "20"
        source: official_python_demo api/trade.py today_entrust
      overflow_policy: clamp_and_audit
  operation_policy_profiles:
    login: usmart-trade-session-retry-profiles.yaml#/operation_policies/login
    readonly: usmart-trade-session-retry-profiles.yaml#/operation_policies/readonly
    trade_action: usmart-trade-session-retry-profiles.yaml#/operation_policies/trade_action
    trade_sensitive_unlock: usmart-trade-session-retry-profiles.yaml#/operation_policies/trade_sensitive_unlock
  response_envelopes:
    code_msg_data:
      success_code: 0
      code_path: code
      message_path: msg
      data_path: data
      error_mapping: endpoint_local_raw_catalog
    login_compatible_top_or_data:
      success_code: 0
      code_path_candidates:
        - code
        - data.code
      token_path_candidates:
        - data.token
        - token
      expiration_path_candidates:
        - data.expiration
        - expiration
      conflict_policy: response_invalid_if_multiple_values_disagree
      error_mapping: endpoint_local_raw_catalog
endpoint_defaults:
  method: POST
  body_serialization_profile: trade_json_body
  sign_profile: trade_body_md5_rsa_b64
  key_material_profile: usmart_trade_default
  session_profile: usmart_single_account_memory_session_v1
  operation_policy_profile_source: usmart-trade-session-retry-profiles.yaml
  raw_error_catalog: usmart-trade-error-codes.draft.yaml
  real_http_requires:
    - transport.allow_real_http_readonly
    - endpoint.capability_enabled
    - runtime_config_profile_validated
    - raw_record_profile_validated
    - configured_base_url
    - ip_whitelist_ready
    - channel_id_configured
    - key_material_configured
endpoints:
  - id: password_login
    path: /user-server/open-api/login
    capability: login
    operation_kind: login
    gateway_method: connect
    enabled_in_first_readonly_integration: true
    real_http_allowed_in_readonly: true
    header_profile: trade_login_no_auth
    request_id_profile: configurable
    serial_no_profile: none
    pagination_profile: none
    response_envelope: login_compatible_top_or_data
    request_body_profile:
      required_fields: [areaCode, phoneNumber, password]
      encrypted_fields:
        phoneNumber: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
        password: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      forbidden_fields: [tradePassword]
      demo_conflicts:
        - Demo helper would include Authorization key with None before login; profile forbids Authorization for login.
    mapper_notes:
      - Read token from data.token or top-level token.
      - Store token only in memory session and audit only token fingerprint.

  - id: send_phone_captcha
    path: /user-server/open-api/send-phone-captcha
    capability: login_captcha
    operation_kind: login
    gateway_method: request_login_captcha
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    header_profile: trade_login_no_auth
    request_id_profile: configurable
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [type, phoneNumber]
      optional_fields: [areaCode]
      encrypted_fields:
        phoneNumber: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      defaults:
        type: "106"
    safety_notes:
      - Default disabled to avoid SMS/captcha abuse.

  - id: captcha_login
    path: /user-server/open-api/loginCaptcha
    capability: login
    operation_kind: login
    gateway_method: connect
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    header_profile: trade_login_no_auth
    request_id_profile: configurable
    serial_no_profile: none
    pagination_profile: none
    response_envelope: login_compatible_top_or_data
    request_body_profile:
      required_fields: [areaCode, phoneNumber, captcha]
      encrypted_fields:
        phoneNumber: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      forbidden_fields: [modifyUserConfigParam]
      pending_confirmation:
        - Web body example mentions modifyUserConfigParam but parameter table does not; do not send unless confirmed by debugging or broker support.

  - id: trade_login
    path: /user-server/open-api/trade-login
    capability: trade_login
    operation_kind: trade_sensitive_unlock
    idempotency_profile: trade_unlock_request_v1
    gateway_method: trade_login
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    header_profile: trade_demo_default
    request_id_profile: configurable
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [password]
      encrypted_fields:
        password: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      secret_source: trade_password_secret_ref
    safety_notes:
      - Do not auto-call this endpoint when broker reports trade lock.

  - id: entrust_order
    path: /stock-order-server/open-api/entrust-order
    capability: place_order
    operation_kind: trade_action
    idempotency_profile: trade_order_serial_no_v1
    gateway_method: place_order
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    dry_run_builder_required: true
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: snowflake_19_string_or_int64
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [serialNo, entrustAmount, entrustPrice, entrustProp, entrustType, exchangeType, stockCode]
      optional_fields: [stockName, password, forceEntrustFlag, sessionType, orderType, validDate, exchange]
      default_omissions: [password, forceEntrustFlag, sessionType, orderType, validDate, exchange]
      encrypted_fields:
        password: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      allowed_first_live_shape:
        exchangeType: 5
        entrustProp: "0"
        entrustType: [0, 1]
        entrustPrice: positive_decimal
        sessionType: [0, omitted]
      rejected_by_default: [forceEntrustFlag_true, market_order, prepost_market, grey_market, options, margin_or_short]
    idempotency:
      body_serialNo_maps_to_internal_broker_request_id: true
      header_X_Request_Id_required: false
      no_auto_retry_on_timeout: true

  - id: odd_entrust
    path: /stock-order-server/open-api/odd-entrust
    capability: odd_lot_order
    operation_kind: trade_action
    idempotency_profile: trade_order_serial_no_v1
    gateway_method: place_odd_lot_order
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    dry_run_builder_required: true
    header_profile: trade_demo_default
    request_id_profile: configurable
    serial_no_profile: configurable
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [entrustAmount, entrustPrice, entrustType, exchangeType, stockCode]
      optional_fields: [password, forceEntrustFlag, serialNo]
      encrypted_fields:
        password: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      allowed_first_live_shape:
        exchangeType: 5
        entrustType: [0, 1]
        entrustPrice: positive_decimal
      pending_confirmation:
        - Minimum notional, minimum shares, quantity precision, serialNo requirement, and order status semantics.

  - id: modify_order
    path: /stock-order-server/open-api/modify-order
    capability: modify_order
    operation_kind: trade_action
    idempotency_profile: trade_modify_cancel_request_id_v1
    gateway_method: modify_order
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    dry_run_builder_required: true
    header_profile: trade_with_request_id
    request_id_profile: demo_modify_16
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [actionType, entrustAmount, entrustId, entrustPrice]
      optional_fields: [password, forceEntrustFlag]
      constants:
        actionType: 1
      encrypted_fields:
        password: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      pending_confirmation:
        - Web manual says X-Request-Id length 30; demo uses 16-digit gen_unix_time_str(16).
        - Broker modify behavior may be native modify or cancel+replace; OMS treats as cancel+replace.

  - id: cancel_order
    path: /stock-order-server/open-api/modify-order
    capability: cancel_order
    operation_kind: trade_action
    idempotency_profile: trade_modify_cancel_request_id_v1
    gateway_method: cancel_order
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    dry_run_builder_required: true
    header_profile: trade_with_request_id
    request_id_profile: demo_modify_16
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [actionType, entrustAmount, entrustId, entrustPrice]
      optional_fields: [password, forceEntrustFlag]
      constants:
        actionType: 0
        entrustAmount: 0
        entrustPrice: 0
      encrypted_fields:
        password: sensitive_rsa_pkcs1_v1_5_urlsafe_b64
      pending_confirmation:
        - Same endpoint as modify_order; actionType semantics are for ordinary stock orders only, not IPO.

  - id: odd_modify_cancel
    path: /stock-order-server/open-api/odd-modify
    capability: odd_lot_cancel
    operation_kind: trade_action
    idempotency_profile: trade_modify_cancel_request_id_v1
    gateway_method: cancel_odd_lot_order
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    dry_run_builder_required: true
    header_profile: trade_with_request_id
    request_id_profile: configurable
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [actionType, oddId]
      constants:
        actionType: 0
      pending_confirmation:
        - Odd lot cancel details are not covered by the official Python demo.

  - id: today_entrust
    path: /stock-order-server/open-api/today-entrust
    capability: order_query
    operation_kind: readonly
    gateway_method: query_orders
    order_query_scope: today
    enabled_in_first_readonly_integration: true
    real_http_allowed_in_readonly: true
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: none
    pagination_profile: today_entrust_web_with_demo_compat
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [exchangeType]
      optional_fields: [pageNum, pageSize, stockCode, stockName]
      defaults:
        exchangeType: 100
        pageNum: 1
        pageSize: 10
      demo_defaults:
        pageNum: "0"
        pageSize: "20"
        stockCode: ""
      empty_string_policy: omit_optional_empty_strings
    mapper_paths:
      list: data.list
      total: data.total

  - id: his_entrust
    path: /stock-order-server/open-api/his-entrust
    capability: order_query
    operation_kind: readonly
    gateway_method: query_orders
    order_query_scope: history
    enabled_in_first_readonly_integration: true
    real_http_allowed_in_readonly: true
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: none
    pagination_profile: web_1_based_default_10_max_20
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [dateFlag, exchangeType]
      optional_fields: [entrustBeginDate, entrustEndDate, pageNum, pageSize, stockCode, stockName]
      defaults:
        dateFlag: 1
        exchangeType: 100
        pageNum: 1
        pageSize: 10
      guarded_values:
        dateFlag_7_query_all: requires_explicit_config
    mapper_paths:
      list: data.list
      total: data.total

  - id: order_detail
    path: /stock-order-server/open-api/order-detail
    capability: order_query
    operation_kind: readonly
    gateway_method: query_orders
    order_query_scope: detail
    enabled_in_first_readonly_integration: true
    real_http_allowed_in_readonly: true
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: optional_order_lookup
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      conditional_required_any: [serialNo, entrustId]
      optional_fields: [serialNo, entrustId]
      no_pagination: true
      pending_confirmation:
        - Manual table marks serialNo and entrustId required, while description says at least one of the two; verify by readonly debugging.
    mapper_paths:
      detail: data
      events: data.appEntrustRecordDetailInfoList

  - id: stock_record
    path: /stock-order-server/open-api/stock-record
    capability: trade_query
    operation_kind: readonly
    gateway_method: query_trades
    enabled_in_first_readonly_integration: true
    real_http_allowed_in_readonly: true
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: none
    pagination_profile: web_1_based_default_10_max_20
    response_envelope: code_msg_data
    request_body_profile:
      required_fields: [exchangeType]
      optional_fields: [stockCode, entrustId, beginTime, endTime, pageNum, pageSize]
      defaults:
        exchangeType: 100
        pageNum: 1
        pageSize: 10
      pending_confirmation:
        - Manual gives yyyy-MM-dd beginTime/endTime but not closed/open interval semantics or maximum date span; verify by readonly debugging.
    mapper_paths:
      list: data.list
      total: data.total

  - id: open_asset_query_v1
    path: /asset-center-server/open-api/open-assetQuery/v1
    capability: account_query_and_position_query
    operation_kind: readonly
    gateway_methods: [get_account, get_cash, get_positions]
    enabled_in_first_readonly_integration: true
    real_http_allowed_in_readonly: true
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      optional_fields: [moneyType]
      defaults: {}
      forbidden_fields: [exchangeType]
      currency_mapping:
        CNY: 0
        USD: 1
        HKD: 2
    mapper_paths:
      assets: data.assetSingleInfoRespVOS
      positions: data.assetSingleInfoRespVOS[].holdInfos
    pending_confirmation:
      - Current web manual implements asset/holding through data.assetSingleInfoRespVOS and data.assetSingleInfoRespVOS[].holdInfos; changelog/demo mention stock-holding but no current manual endpoint section exists. Real account coverage must be verified by readonly smoke.
      - Multi-account, multi-currency, and multi-business-type merge semantics are visible in fields but must be confirmed with real readonly responses.

  - id: demo_stock_holding
    path: /stock-order-server/open-api/stock-holding
    capability: position_query
    raw_error_catalog_required: false
    raw_error_catalog_status: unavailable_for_changelog_mentioned_demo_example_endpoint
    operation_kind: readonly
    gateway_method: get_positions
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    fallback_candidate_for: open_asset_query_v1
    request_body_profile:
      required_fields: [exchangeType]
    fallback_policy:
      silent_fallback_allowed: false
      requires_explicit_config: true
      requires_raw_error_catalog_before_real_http: true
      requires_audit_event: true
      manual_status: changelog_mentions_stock_holding_but_no_current_endpoint_section
      demo_reference: api/trade.py stock_holding(exchangeType)

  - id: trade_quantity
    path: /stock-order-server/open-api/trade-quantity
    capability: trade_quantity_query
    operation_kind: readonly
    gateway_method: query_trade_quantity
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      pending_implementation: true
      pending_confirmation:
        - Needed for future max buy/sell and odd-lot sell validation; not in first readonly batch.

  - id: modified_range
    path: /stock-order-server/open-api/modified-range
    capability: modify_range_query
    operation_kind: readonly
    gateway_method: query_modify_range
    enabled_in_first_readonly_integration: false
    real_http_allowed_in_readonly: false
    header_profile: trade_demo_default
    request_id_profile: none
    serial_no_profile: none
    pagination_profile: none
    response_envelope: code_msg_data
    request_body_profile:
      pending_implementation: true
      pending_confirmation:
        - Required before future real modify_order; not in first readonly batch.
validation_rules:
  - id: all_enabled_readonly_have_no_trade_action_operation_kind
    rule: endpoints where enabled_in_first_readonly_integration=true must have operation_kind in [login, readonly].
  - id: trade_actions_are_not_real_http_in_readonly
    rule: endpoints where operation_kind=trade_action must have real_http_allowed_in_readonly=false.
  - id: sign_and_send_same_body
    rule: every endpoint must use body_serialization_profile=trade_json_body unless explicitly excluded from trade_openapi.
  - id: raw_error_catalog_endpoint_key
    rule: every endpoint path must be looked up as endpoint-local key in usmart-trade-error-codes.draft.yaml when broker returns code != 0, except endpoints with raw_error_catalog_required=false. Such endpoints cannot be enabled for real HTTP until a raw catalog is added or official integration confirms mapping.
  - id: operation_kind_must_have_session_retry_policy
    rule: every endpoint operation_kind must resolve to an operation_policies entry in usmart-trade-session-retry-profiles.yaml.
  - id: trade_actions_use_no_retry_policy
    rule: endpoints where operation_kind=trade_action must resolve to retry_profile=trade_action_no_retry_v1 and must not enable readonly retry or relogin behavior.
  - id: trade_actions_must_set_endpoint_idempotency_profile
    rule: endpoints where operation_kind=trade_action must set idempotency_profile to one of trade_order_serial_no_v1 or trade_modify_cancel_request_id_v1.
  - id: readonly_reauth_requires_new_request_id
    rule: readonly relogin after 401/auth-expired must create a new broker_request_id and must not reuse the failed request id.
  - id: first_readonly_integration_must_have_acceptance_cases
    rule: endpoints where enabled_in_first_readonly_integration=true must be covered by usmart-trade-readonly-acceptance-matrix.yaml.
  - id: real_http_requires_runtime_config_profile
    rule: endpoints with real_http_allowed_in_readonly=true must pass usmart-trade-runtime-config-profile.yaml validation before RealHttpTransport can be installed.
  - id: real_http_requires_raw_record_profile
    rule: endpoints with real_http_allowed_in_readonly=true must pass broker-gateway-raw-record-profile.yaml validation and write request_summary before transport call.
