openapi: 3.1.0
info:
  title: uSmart Trade OpenAPI Integration Draft
  version: 0.1.0-draft
  summary: Draft contract for RobustQuant integration with uSmart trade OpenAPI.
  description: >
    This draft covers only the uSmart trade OpenAPI. It does not include the
    basic quote OpenAPI or quote push WebSocket API. Fields marked with
    x-pending-confirmation must be verified against the official web
    documentation or uSmart before implementation is treated as final. The
    official Python demo is an implementation reference for signing,
    encryption, serialization, and WebSocket flow only.
  x-robustquant-source-docs:
    - ../../../../API_manual/uSmart/API_manual/usmart-trade-openapi.zh-cn.md
    - ../../../../API_manual/uSmart/API_manual/usmart-quote-base-openapi.zh-cn.md
    - ../../../../API_manual/uSmart/API_manual/usmart-quote-push-openapi.zh-cn.md
    - ../../../../API_manual/uSmart/openapi-demo-py/api/trade.py
    - ../../../../API_manual/uSmart/openapi-demo-py/common/req_util.py
    - ../../../../API_manual/uSmart/openapi-demo-py/common/utils.py
    - ../../../../API_manual/uSmart/openapi-demo-py/api/quote_push.py
    - ../../../../API_manual/uSmart/openapi-demo-py/common/ws_util.py
    - ../usmart-openapi-call-design.md
    - ../usmart-openapi-api-manual.md
    - ../../trading/broker-trading-gateway.md
  x-robustquant-scope:
    api_family: trade_openapi
    excludes:
      - basic_quote_openapi
      - quote_push_websocket_api
  x-robustquant-session-policy:
    storage: in_memory_only
    account_scope: single_account_single_session_first_version
    readonly_expired_token: explicit_relogin_allowed_with_new_request_id
    trade_action_expired_token: fail_without_implicit_refresh
    pending_confirmation: expiration format, timezone, official refresh API semantics, and same-account multi-client conflict behavior.
  x-robustquant-demo-reference:
    trade_http:
      sign_input: json body string only
      sign_algorithm: MD5withRSA
      sign_encoding: standard Base64 by user decision, following official Python demo
      observed_headers:
        - Content-type
        - X-Lang
        - X-Channel
        - X-Sign
        - Authorization
      user_confirmed_policy: >
        First implementation follows the official Python demo. X-Time and
        X-Request-Id are not global required headers for trade HTTP endpoints.
        modify-order carries X-Request-Id because the demo explicitly adds it;
        entrust-order relies on body serialNo plus RobustQuant internal
        request audit instead of forcing header X-Request-Id.
    quote_http:
      sign_input: Authorization + X-Channel + X-Lang + X-Request-Id + X-Time + json body string
      sign_algorithm: MD5withRSA
      sign_encoding: URL-safe Base64 in demo
      note: Separate API family; do not reuse the trade signer.
    quote_push_websocket:
      auth_message: '{"op":"auth","accessToken":"<token>"}'
      subscribe_message: '{"op":"sub","topiclist":["<topic>"]}'
      data_payload: base64 decoded update data in the demo
      note: Separate API family; do not mount under TradingGateway.
servers:
  - url: https://open-jy.yxzq.com
    description: uSmart trade OpenAPI production environment from official web documentation.
  - url: http://open-jy-uat.yxzq.com
    description: uSmart trade OpenAPI test environment from official web documentation.
tags:
  - name: auth
    description: Login and captcha endpoints.
  - name: account
    description: Read-only account, cash, and position endpoints.
  - name: orders
    description: Order, modification, cancellation, and order query endpoints.
  - name: trades
    description: Trade record endpoints.
  - name: guarded-trade
    description: Trade actions that RobustQuant must block outside live_guarded.
paths:
  /user-server/open-api/login:
    post:
      tags: [auth]
      operationId: usmartPasswordLogin
      summary: Channel password login.
      description: >
        Password login using phone number, password, and channel headers. In
        application screenshots this endpoint must be shown by dry-run only.
      x-robustquant-first-readonly: true
      x-robustquant-dry-run-for-application: true
      parameters:
        - $ref: "#/components/parameters/HeaderContentType"
        - $ref: "#/components/parameters/HeaderLang"
        - $ref: "#/components/parameters/HeaderChannel"
        - $ref: "#/components/parameters/HeaderTime"
        - $ref: "#/components/parameters/HeaderDeviceTypeObserved"
        - $ref: "#/components/parameters/HeaderAppType"
        - $ref: "#/components/parameters/HeaderRequestId"
        - $ref: "#/components/parameters/HeaderSign"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginRequest"
      responses:
        "200":
          description: Business response from uSmart.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /user-server/open-api/send-phone-captcha:
    post:
      tags: [auth]
      operationId: usmartSendPhoneCaptcha
      summary: Send phone captcha for channel captcha login.
      x-robustquant-first-readonly: false
      x-robustquant-dry-run-for-application: true
      parameters:
        - $ref: "#/components/parameters/HeaderContentType"
        - $ref: "#/components/parameters/HeaderLang"
        - $ref: "#/components/parameters/HeaderChannel"
        - $ref: "#/components/parameters/HeaderTime"
        - $ref: "#/components/parameters/HeaderDeviceTypeObserved"
        - $ref: "#/components/parameters/HeaderAppType"
        - $ref: "#/components/parameters/HeaderRequestId"
        - $ref: "#/components/parameters/HeaderSign"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPhoneCaptchaRequest"
      responses:
        "200":
          description: Business response from uSmart.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
  /user-server/open-api/loginCaptcha:
    post:
      tags: [auth]
      operationId: usmartCaptchaLogin
      summary: Channel captcha login.
      x-robustquant-first-readonly: true
      x-robustquant-dry-run-for-application: true
      x-pending-confirmation: >
        Official example contains modifyUserConfigParam, but parameter table
        lists only areaCode, captcha, and phoneNumber. RobustQuant does not send
        modifyUserConfigParam until uSmart confirms it is required.
      parameters:
        - $ref: "#/components/parameters/HeaderContentType"
        - $ref: "#/components/parameters/HeaderLang"
        - $ref: "#/components/parameters/HeaderChannel"
        - $ref: "#/components/parameters/HeaderTime"
        - $ref: "#/components/parameters/HeaderDeviceTypeObserved"
        - $ref: "#/components/parameters/HeaderAppType"
        - $ref: "#/components/parameters/HeaderRequestId"
        - $ref: "#/components/parameters/HeaderSign"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptchaLoginRequest"
      responses:
        "200":
          description: Business response from uSmart.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /stock-order-server/open-api/entrust-order:
    post:
      tags: [orders, guarded-trade]
      operationId: usmartPlaceOrder
      summary: Place a normal stock order.
      description: >
        RobustQuant must block real calls unless the gateway is in live_guarded
        mode and all OMS, risk, time-window, and audit checks pass.
      x-robustquant-first-live-scope: us_regular_hours_limit_order
      x-robustquant-blocked-in-read-only: true
      x-robustquant-dry-run-for-application: true
      x-robustquant-header-profile: trade_demo_default
      x-robustquant-first-live-order-profile:
        market: US
        exchangeType: 5
        order_type: LIMIT
        entrustProp: "0"
        entrustType: [0, 1]
        entrustPrice: positive_decimal
        sessionType: 0_or_omitted
        reject_when_mapping_uncertain: true
      parameters:
        - $ref: "#/components/parameters/HeaderAuthorization"
        - $ref: "#/components/parameters/HeaderContentType"
        - $ref: "#/components/parameters/HeaderLang"
        - $ref: "#/components/parameters/HeaderChannel"
        - $ref: "#/components/parameters/HeaderTime"
        - $ref: "#/components/parameters/HeaderDeviceType"
        - $ref: "#/components/parameters/HeaderAppType"
        - $ref: "#/components/parameters/HeaderRequestId"
        - $ref: "#/components/parameters/HeaderSign"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "200":
          description: Business response from uSmart.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderActionResponse"
  /stock-order-server/open-api/modify-order:
    post:
      tags: [orders, guarded-trade]
      operationId: usmartModifyOrCancelOrder
      summary: Modify or cancel a normal stock order.
      description: >
        The same endpoint is used for normal stock order modification and
        cancellation. actionType=1 means modify, and actionType=0 means cancel.
        IPO modification/cancellation uses different enums and is excluded.
      x-robustquant-blocked-in-read-only: true
      x-robustquant-dry-run-for-application: true
      x-robustquant-header-profile: trade_demo_modify_order
      parameters:
        - $ref: "#/components/parameters/HeaderAuthorization"
        - $ref: "#/components/parameters/HeaderContentType"
        - $ref: "#/components/parameters/HeaderLang"
        - $ref: "#/components/parameters/HeaderChannel"
        - $ref: "#/components/parameters/HeaderTime"
        - $ref: "#/components/parameters/HeaderAppType"
        - $ref: "#/components/parameters/HeaderRequestId"
        - $ref: "#/components/parameters/HeaderSign"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ModifyOrderRequest"
                - $ref: "#/components/schemas/CancelOrderRequest"
              discriminator:
                propertyName: actionType
      responses:
        "200":
          description: Business response from uSmart.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderActionResponse"
  /stock-order-server/open-api/odd-entrust:
    post:
      tags: [orders, guarded-trade]
      operationId: usmartPlaceOddLotOrder
      summary: Place an odd-lot order.
      x-robustquant-first-live-scope: us_odd_lot_only
      x-robustquant-blocked-in-read-only: true
      x-user-confirmed: "2026-05-21: first version enables US odd-lot buy and sell."
      x-robustquant-first-live-order-profile:
        market: US
        exchangeType: 5
        sides:
          buy: 0
          sell: 1
        internal_model: amount_based
        broker_entrustAmount: notional_amount / entrustPrice
        numeric_policy: Use Decimal internally; serialize to uSmart JSON number at the HTTP boundary.
        reject_when_mapping_uncertain: true
      x-pending-confirmation: >
        Minimum notional amount, minimum fractional-share quantity, quantity
        precision, order status flow, and cancellation details.
      parameters:
        - $ref: "#/components/parameters/HeaderAuthorization"
        - $ref: "#/components/parameters/HeaderContentType"
        - $ref: "#/components/parameters/HeaderLang"
        - $ref: "#/components/parameters/HeaderChannel"
        - $ref: "#/components/parameters/HeaderTime"
        - $ref: "#/components/parameters/HeaderDeviceType"
        - $ref: "#/components/parameters/HeaderAppType"
        - $ref: "#/components/parameters/HeaderRequestId"
        - $ref: "#/components/parameters/HeaderSign"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OddLotOrderRequest"
      responses:
        "200":
          description: Business response from uSmart.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessResponse"
  /stock-order-server/open-api/odd-modify:
    post:
      tags: [orders, guarded-trade]
      operationId: usmartCancelOddLotOrder
      summary: Cancel an odd-lot order.
      x-robustquant-first-live-scope: us_odd_lot_only
      x-robustquant-blocked-in-read-only: true
