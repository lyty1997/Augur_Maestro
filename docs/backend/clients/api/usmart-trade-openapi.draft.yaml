components:
  parameters:
    HeaderAuthorization:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      description: Login token. Must never be logged in full.
    HeaderContentType:
      name: Content-Type
      in: header
      required: false
      schema:
        type: string
        const: application/json; charset=utf-8
      description: Declared by OpenAPI requestBody content type; shown explicitly in manual examples.
    HeaderLang:
      name: X-Lang
      in: header
      required: true
      schema:
        type: string
        examples: ["1"]
      x-pending-confirmation: Full language enum.
    HeaderChannel:
      name: X-Channel
      in: header
      required: true
      schema:
        type: string
      description: Channel ID assigned by uSmart.
    HeaderTime:
      name: X-Time
      in: header
      required: false
      schema:
        type: string
      description: Unix epoch milliseconds represented as a string.
      x-demo-observed: >
        Official Python demo uses X-Time on quote HTTP signing. Trade HTTP demo
        does not add X-Time in the shared trade request helper.
      x-robustquant-required-when: Endpoint header profile or uSmart final integration requires it.
    HeaderDeviceType:
      name: X-Dt
      in: header
      required: true
      schema:
        type: string
        enum: ["1", "2", "3", "4", "5"]
      description: 1 Android, 2 iOS, 3 other, 4 Windows, 5 Mac.
    HeaderDeviceTypeObserved:
      name: X-Dt
      in: header
      required: false
      schema:
        type: string
        enum: ["1", "2", "3", "4", "5"]
      description: Observed in manual examples but not listed as required in the endpoint parameter table.
    HeaderAppType:
      name: X-Type
      in: header
      required: false
      schema:
        type: string
        enum: ["1", "2"]
        default: "1"
      description: 1 mainland app, 2 Hong Kong app. Observed in examples; not listed in every endpoint parameter table.
    HeaderRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 30
      description: >
        Endpoint-level request id header. RobustQuant always keeps an internal
        broker_request_id for audit, but only sends this header when the
        endpoint header profile requires it.
      x-robustquant-required-when: modify-order profile, or another endpoint profile explicitly enables it.
      x-pending-confirmation: Effective lifetime and duplicate semantics.
    HeaderSign:
      name: X-Sign
      in: header
      required: true
      schema:
        type: string
      description: Signature over stable JSON body using trade OpenAPI key material.
      x-demo-observed: >
        Official Python demo signs json.dumps(params) with MD5withRSA and
        encodes trade X-Sign with standard Base64. User confirmed RobustQuant
        should follow the official Python demo for trade X-Sign encoding and
        keep URL-safe Base64 as a configurable fallback if uSmart requires it.
        Quote HTTP uses a different header+body signing string and URL-safe
        Base64.
    SensitiveFieldEncryption:
      description: >
        Official Python demo EncryptUtil.rsa_encrypt uses RSA PKCS1_v1_5
        encryption and URL-safe Base64 encoding for phoneNumber, login
        password, and trade password fields. Demo variable names and PEM
        wrapping for public_key/private_key are unusual, so RobustQuant binds
        final broker-provided key material to explicit config slots and verifies
        the transform in offline tests instead of inferring semantics from names.
  schemas:
    PasswordLoginRequest:
      type: object
      additionalProperties: false
      required: [areaCode, phoneNumber, password]
      properties:
        areaCode:
          type: string
        phoneNumber:
          type: string
          description: Encrypted phone number.
          x-sensitive: true
          x-demo-observed: RSA PKCS1_v1_5 encryption followed by URL-safe Base64.
          x-pending-confirmation: Final broker key material to demo config slot mapping.
        password:
          type: string
          description: Encrypted login password.
          x-sensitive: true
          x-demo-observed: RSA PKCS1_v1_5 encryption followed by URL-safe Base64.
          x-pending-confirmation: Final broker key material to demo config slot mapping.
    SendPhoneCaptchaRequest:
      type: object
      additionalProperties: false
      required: [areaCode, phoneNumber, type]
      properties:
        areaCode:
          type: string
        phoneNumber:
          type: string
          description: Encrypted phone number.
          x-sensitive: true
          x-demo-observed: RSA PKCS1_v1_5 encryption followed by URL-safe Base64.
          x-pending-confirmation: Final broker key material to demo config slot mapping.
        type:
          type: integer
          const: 106
    CaptchaLoginRequest:
      type: object
      additionalProperties: false
      required: [areaCode, phoneNumber, captcha]
      properties:
        areaCode:
          type: string
        phoneNumber:
          type: string
          description: Encrypted phone number.
          x-sensitive: true
          x-demo-observed: RSA PKCS1_v1_5 encryption followed by URL-safe Base64.
          x-pending-confirmation: Final broker key material to demo config slot mapping.
        captcha:
          type: string
          x-sensitive: true
    PlaceOrderRequest:
      type: object
      additionalProperties: false
      required:
        - serialNo
        - entrustAmount
        - entrustPrice
        - entrustProp
        - entrustType
        - exchangeType
        - stockCode
      properties:
        serialNo:
          type: integer
          format: int64
          description: Body serial number mapped from local broker_request_id.
          x-pending-confirmation: >
            Web documentation field table says int64; examples and the official
            Python demo generate a 19-digit string. User confirmed first draft
            may keep numeric serialization, but implementation should keep this
            as a configurable serializer if uSmart rejects numeric JSON.
        entrustAmount:
          $ref: "#/components/schemas/DecimalNumber"
        entrustPrice:
          $ref: "#/components/schemas/DecimalNumber"
        entrustProp:
          type: string
          enum: ["0", "d", "e", "g", "w"]
          x-robustquant-first-live-allowed: ["0"]
          x-user-confirmed: "2026-05-21: first live normal-order profile only enables 0 for US regular-hours limit orders."
          x-robustquant-rejects: ["d", "e", "g", "w"]
          description: >
            First implementation enables only 0 for US regular-hours limit
            orders. Web documentation adds w-market order; RobustQuant first
            live scope rejects market orders. HK grey-market rules are
            design-only. Odd-lot orders use /stock-order-server/open-api/odd-entrust
            and do not send entrustProp according to the current manual.
        entrustType:
          type: integer
          enum: [0, 1]
          description: 0 buy, 1 sell.
        exchangeType:
          type: integer
          enum: [0, 5, 6, 7]
          x-robustquant-first-live-allowed: [5]
          x-user-confirmed: "2026-05-21: first live normal-order profile only enables US exchangeType=5."
        stockCode:
          type: string
        stockName:
          type: string
        password:
          type: string
          x-sensitive: true
          x-pending-confirmation: Whether trading password is required and how it is encrypted.
        forceEntrustFlag:
          type: boolean
          default: false
          x-robustquant-default: false
        sessionType:
          type: integer
